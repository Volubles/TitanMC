signs:
  refresh-seconds: 30
  available:
    - "<green><bold>AVAILABLE CELL"
    - "<white>{display_name}"
    - "<gold>{price}"
    - "<gray>{duration}"
  rented:
    - "<green><bold>{display_name}"
    - "<white>{owner}"
    - "<yellow>{time_left}"
    - "<gray>Right-click"
  resetting:
    - "<yellow><bold>{display_name}"
    - "<gray>Resetting"
    - ""
    - "<dark_gray>Please wait..."

menus:
  rental:
    rows: 3
    title: "<dark_green>Rent {display_name}"
    items:
      info:
        material: CLOCK
        slot: 11
        name: "<green><bold>{display_name}"
        lore:
          - "<gray>Ward: <white>{ward}"
          - "<gray>Price: <gold>${price}"
          - "<gray>Duration: <white>{duration}"
      confirm:
        material: LIME_CONCRETE
        slot: 15
        name: "<green><bold>Confirm rental"
        lore:
          - "<gray>Click to pay <gold>${price}"
      close:
        material: BARRIER
        slot: 22
        name: "<red>Close"
        lore: []
  management:
    rows: 3
    title: "<dark_green>{display_name}"
    items:
      info:
        material: CLOCK
        slot: 4
        name: "<green><bold>{display_name}"
        lore:
          - "<gray>Ward: <white>{ward}"
          - "<gray>Time left: <yellow>{time_left}"
          - "<gray>Members: <white>{member_count}"
      extend:
        material: EMERALD
        slot: 10
        name: "<green><bold>Extend rent"
        lore:
          - "<gray>Time left: <yellow>{time_left}"
          - "<gray>Cost: <gold>${price}"
          - "<gray>Adds: <white>{duration}"
          - "<gray>Maximum: <white>{max_duration}"
      members:
        material: PLAYER_HEAD
        slot: 14
        name: "<aqua><bold>Manage members"
        lore:
          - "<gray>Add or remove access"
      sellback:
        material: RED_CONCRETE
        slot: 16
        name: "<red><bold>Sell back cell"
        lore:
          - "<gray>This starts a full reset"
      close:
        material: BARRIER
        slot: 22
        name: "<red>Close"
        lore: []
  status:
    rows: 3
    title: "<dark_green>{display_name}"
    items:
      info:
        material: OAK_SIGN
        slot: 13
        name: "<green><bold>{display_name}"
        lore:
          - "<gray>Ward: <white>{ward}"
          - "<gray>Owner: <white>{owner}"
          - "<gray>Time left: <yellow>{time_left}"
          - "{access}"
      close:
        material: BARRIER
        slot: 22
        name: "<red>Close"
        lore: []
  members:
    rows: 6
    title: "<dark_green>Members: {display_name}"
    items:
      member:
        material: PLAYER_HEAD
        slot: 0
        name: "<white>{player}"
        lore:
          - "<red>Click to remove"
      add:
        material: LIME_CONCRETE
        slot: 45
        name: "<green><bold>Add member"
        lore:
          - "<gray>Enter a username in chat"
      back:
        material: ARROW
        slot: 49
        name: "<yellow>Back"
        lore: []
      close:
        material: BARRIER
        slot: 53
        name: "<red>Close"
        lore: []
  sellback:
    rows: 3
    title: "<dark_red>Confirm sellback"
    items:
      keep:
        material: LIME_CONCRETE
        slot: 11
        name: "<green><bold>Keep cell"
        lore: []
      confirm:
        material: RED_CONCRETE
        slot: 15
        name: "<red><bold>Sell back permanently"
        lore:
          - "<red>All items in this cell will be removed"
          - "<gray>and sold through the Storage Auction House."

sellback:
  refund-percent: 0
