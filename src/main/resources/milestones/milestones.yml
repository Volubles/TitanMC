menus:
  overview:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>Milestones</bold></gradient>"
  category:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>{category}</bold></gradient>"
  track:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>{category}</bold></gradient>"

notifications:
  completion:
    enabled: true
    # 20 ticks = 1 second. The first message waits 50 ticks (2.5 seconds)
    # so rankups and other primary announcements can finish first.
    initial-delay-ticks: 50
    spacing-ticks: 20
    player-message:
      enabled: true
      centered: true
      lines:
        - ""
        - "<gradient:#42d829:#30bbf1><bold>MILESTONE COMPLETE</bold></gradient>"
        - "<gray>You completed <yellow>{milestone}</yellow><gray>."
        - "<dark_gray>{track} <gray>| Reward: <#42d829>{rewards}"
        - ""
    sound: "entity.player.levelup"
    broadcast:
      enabled: true
      centered: true
      minimum-target: 100000
      lines:
        - ""
        - "<gradient:#42d829:#30bbf1><bold>MILESTONE COMPLETE</bold></gradient>"
        - "<gold>{player}</gold> <gray>completed <yellow>{milestone}</yellow><gray>."
        - "<dark_gray>{track} <gray>| Reward: <#42d829>{rewards}"
        - ""
      sound: "ui.toast.challenge_complete"

categories:
  mining:
    name: "Mining"
    icon: DIAMOND_PICKAXE
    enabled: true
  ranks:
    name: "Ranks"
    icon: NETHER_STAR
    enabled: true
  progression:
    name: "Progression"
    icon: EXPERIENCE_BOTTLE
    enabled: false
  cells:
    name: "Cells"
    icon: OAK_DOOR
    enabled: false
  auctions:
    name: "Auctions"
    icon: CHEST
    enabled: false

