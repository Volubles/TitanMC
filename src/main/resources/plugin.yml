name: TitanMC
version: '1.0-SNAPSHOT'
main: com.voluble.titanMC.TitanMC
api-version: '1.21'
softdepend: [Vault, LuckPerms, WorldEdit, FastAsyncWorldEdit]
commands:
  dtools:
    description: Give a donator tool
    usage: /dtools <tool> [player]
    permission: donatortools.give
  mine:
    description: Manage mines
    usage: /mine <list|create|redefine|setinterval|addblock|removeblock|template|resetmode|forcereset|delete>
    permission: titanmc.mine.admin
  region:
    description: Manage protection regions
    aliases: [rg]
    usage: /region <create|redefine|delete|list|info|priority|test|flag|message>
    permission: titanmc.region.admin
  cell:
    aliases: [cells]
    description: Manage rentable cells
    usage: /cell <create|delete|list|info|displayname|ward|reset|sign|member>
    permission: titanmc.cell.admin
  auction:
    aliases: [ah]
    description: Manage thrift auction positions
    usage: /auction position <add|remove|list|teleport>
    permission: titanmc.auction.admin
permissions:
  donatortools.give:
    description: Allows giving donator tools
    default: op
  donatortools.reload:
    description: Allows reloading the donator tools config
    default: op
  titanmc.mine.admin:
    description: Allows managing mines
    default: op
    children:
      titanmc.protection.bypass: true
  titanmc.region.admin:
    description: Allows managing protection regions
    default: op
    children:
      titanmc.protection.bypass: true
  titanmc.cell.admin:
    description: Allows managing rentable cells
    default: op
    children:
      titanmc.protection.bypass: true
  titanmc.auction.admin:
    description: Allows managing thrift auction positions
    default: op
  titanmc.rank.use:
    description: Allows viewing and purchasing prison ranks
    default: true
  titanmc.rank.admin:
    description: Allows managing player prison ranks
    default: op
  titanmc.protection.bypass:
    description: Bypasses Titan region protection
    default: op
