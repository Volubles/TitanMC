name: TitanMC
version: '1.0-SNAPSHOT'
main: com.voluble.titanMC.TitanMC
api-version: '1.21'
softdepend: [Vault, LuckPerms, WorldEdit, FastAsyncWorldEdit, PlaceholderAPI, SkinsRestorer]
commands:
  dtools:
    description: Give a donator tool
    usage: /dtools <tool> [player]
    permission: donatortools.give
  mine:
    description: Manage mines
    usage: /mine <list|create|redefine|setinterval|addblock|removeblock|template|resetmode|forcereset|delete>
    permission: titanmc.mine.admin
  region:
    description: Manage protection regions
    aliases: [rg]
    usage: /region <create|redefine|delete|list|info|priority|test|flag|message>
    permission: titanmc.region.admin
  cell:
    aliases: [cells]
    description: Manage rentable cells
    usage: /cell <create|delete|list|info|displayname|ward|reset|sign|member>
    permission: titanmc.cell.admin
  auction:
    aliases: [ah]
    description: Manage thrift auction positions
    usage: /auction position <add|remove|list|teleport>
    permission: titanmc.auction.admin
  cred:
    description: Show or manage cred and player levels
    usage: /cred [info <player>|give <player> <amount> [source]|take <player> <amount>]
    permission: titanmc.cred.use
  milestones:
    aliases: [milestone]
    description: View milestone progress
    usage: /milestones [admin <reload|progress|reset>]
    permission: titanmc.milestones.use
  outfit:
    aliases: [outfits]
    description: Choose a server outfit
    usage: /outfit [use <outfit|original>|status|reload]
    permission: titanmc.outfits.use
permissions:
  donatortools.give:
    description: Allows giving donator tools
    default: op
  donatortools.reload:
    description: Allows reloading the donator tools config
    default: op
  titanmc.mine.admin:
    description: Allows managing mines
    default: op
    children:
      titanmc.protection.bypass: true
      titanmc.mine.break-bypass: true
  titanmc.mine.break-bypass:
    description: Bypasses per-mine diggable block restrictions
    default: op
  titanmc.region.admin:
    description: Allows managing protection regions
    default: op
    children:
      titanmc.protection.bypass: true
  titanmc.cell.admin:
    description: Allows managing rentable cells
    default: op
    children:
      titanmc.protection.bypass: true
  titanmc.auction.admin:
    description: Allows managing thrift auction positions
    default: op
  titanmc.rank.use:
    description: Allows viewing and purchasing prison ranks
    default: true
  titanmc.rank.admin:
    description: Allows managing player prison ranks
    default: op
  titanmc.cred.use:
    description: Allows viewing own cred and level
    default: true
  titanmc.cred.admin:
    description: Allows viewing and adjusting other players' cred
    default: op
  titanmc.milestones.use:
    description: Allows viewing milestone progress
    default: true
  titanmc.milestones.admin:
    description: Allows reloading and managing milestone progress
    default: op
  titanmc.outfits.use:
    description: Allows choosing server outfits
    default: true
  titanmc.outfits.admin:
    description: Allows reloading outfit configuration
    default: op
  titanmc.protection.bypass:
    description: Bypasses Titan region protection
    default: op
